<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Quản lý vật chất</title>
</head>
<body>

<h2>📦 Quản lý vật chất</h2>

<input id="ten" placeholder="Loại vật chất"><br><br>
<input id="nguoi" placeholder="Người mượn"><br><br>
<input id="thoigian" placeholder="Thời gian"><br><br>
<input id="soluong" type="number" placeholder="Số lượng"><br><br>

<button onclick="nhap()">Nhập</button>
<button onclick="xuat()">Xuất</button>

<h3>Tồn kho:</h3>
<div id="tonkho">0</div>

<h3>Lịch sử:</h3>
<ul id="lichsu"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDM9SSwVDdVqTY2iqhVqqFboXj1J-2v6HI",
  authDomain: "quanlykho-fb73b.firebaseapp.com",
  databaseURL: "https://quanlykho-fb73b-default-rtdb.firebaseio.com",
  projectId: "quanlykho-fb73b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ===== LẤY DỮ LIỆU =====
async function getVatChat(ten) {
  const snapshot = await get(ref(db, "vatchat/" + ten));
  if (snapshot.exists()) return snapshot.val();
  return { soLuong: 0, tonKho: 0 };
}

// ===== CẬP NHẬT =====
async function updateVatChat(ten, data) {
  await set(ref(db, "vatchat/" + ten), data);
}

// ===== NHẬP =====
window.nhap = async function() {
  const ten = document.getElementById("ten").value.trim();
  const nguoi = document.getElementById("nguoi").value.trim();
  const thoigian = document.getElementById("thoigian").value.trim();
  const soluong = parseInt(document.getElementById("soluong").value);

  if (!ten || !soluong) {
    alert("Nhập thiếu dữ liệu!");
    return;
  }

  let data = await getVatChat(ten);

  data.soLuong += soluong;
  data.tonKho += soluong;

  await updateVatChat(ten, data);

  await push(ref(db, "lichsu"), {
    ten,
    nhap: soluong,
    xuat: 0,
    thoigian,
    nguoi
  });

  alert("Đã nhập!");
};

// ===== XUẤT =====
window.xuat = async function() {
  const ten = document.getElementById("ten").value.trim();
  const nguoi = document.getElementById("nguoi").value.trim();
  const thoigian = document.getElementById("thoigian").value.trim();
  const soluong = parseInt(document.getElementById("soluong").value);

  if (!ten || !soluong) {
    alert("Nhập thiếu dữ liệu!");
    return;
  }

  let data = await getVatChat(ten);

  data.tonKho -= soluong;
  if (data.tonKho < 0) data.tonKho = 0;

  await updateVatChat(ten, data);

  await push(ref(db, "lichsu"), {
    ten,
    nhap: 0,
    xuat: soluong,
    thoigian,
    nguoi
  });

  alert("Đã xuất!");
};

// ===== HIỂN THỊ TỒN =====
const tonkhoDiv = document.getElementById("tonkho");

document.getElementById("ten").addEventListener("input", async () => {
  const ten = document.getElementById("ten").value.trim();
  if (!ten) return;
  const data = await getVatChat(ten);
  tonkhoDiv.innerText = data.tonKho;
});

// ===== HIỂN THỊ LỊCH SỬ =====
const list = document.getElementById("lichsu");

onValue(ref(db, "lichsu"), (snapshot) => {
  list.innerHTML = "";
  snapshot.forEach(child => {
    const item = child.val();
    const li = document.createElement("li");
    li.innerText = `${item.ten} | +${item.nhap} | -${item.xuat} | ${item.nguoi} | ${item.thoigian}`;
    list.appendChild(li);
  });
});
</script>

</body>
</html>
