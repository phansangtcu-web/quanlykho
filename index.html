<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý kho</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f2f2f2;
}

img {
    width: 500px;
    margin: 15px;
    border-radius: 10px;
}

input, button {
    padding: 8px;
    margin: 5px;
}

table {
    margin: auto;
    border-collapse: collapse;
    background: white;
}

td, th {
    border: 1px solid #ccc;
    padding: 6px 10px;
}
</style>
</head>

<body>

<h2>📦 Sơ đồ kho</h2>
<img src="sodo.png">

<h3>Quản lý vật chất</h3>

<input id="ten" placeholder="Loại vật chất">
<input id="sl" type="number" placeholder="Số lượng">
<input id="nguoi" placeholder="Người mượn">

<br>

<button onclick="nhap()">Nhập</button>
<button onclick="xuat()">Xuất</button>
<button onclick="muon()">Mượn</button>
<button onclick="tra()">Trả</button>
<button onclick="xoa()">Xóa vật</button>

<h3>📊 Tồn kho</h3>

<table>
<thead>
<tr>
<th>STT</th>
<th>Loại vật chất</th>
<th>Số lượng</th>
<th>Nhập</th>
<th>Xuất</th>
<th>Tồn kho</th>
<th>Người mượn</th>
<th>Thời gian</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
let data = JSON.parse(localStorage.getItem("kho") || "[]");

function save(){
    localStorage.setItem("kho", JSON.stringify(data));
}

function render(){
    let html = "";

    data.forEach((d, i) => {
        html += `
        <tr>
            <td>${i+1}</td>
            <td>${d.ten}</td>
            <td>${d.soluong}</td>
            <td>${d.nhap}</td>
            <td>${d.xuat}</td>
            <td>${d.ton}</td>
            <td>${d.nguoi || ""}</td>
            <td>${d.time || ""}</td>
        </tr>`;
    });

    document.getElementById("table").innerHTML = html;
}

function getItem(ten){
    return data.find(d => d.ten.toLowerCase() === ten.toLowerCase());
}

// ===== NHẬP =====
function nhap(){
    let ten = document.getElementById("ten").value.trim();
    let sl = parseInt(document.getElementById("sl").value);

    if(!ten || !sl) return alert("Nhập thiếu");

    let item = getItem(ten);

    if(item){
        item.nhap += sl;
        item.soluong += sl;
        item.ton += sl;
    } else {
        data.push({
            ten,
            soluong: sl,
            nhap: sl,
            xuat: 0,
            ton: sl,
            nguoi: "",
            time: ""
        });
    }

    save(); render();
}

// ===== XUẤT =====
function xuat(){
    let ten = document.getElementById("ten").value.trim();
    let sl = parseInt(document.getElementById("sl").value);

    let item = getItem(ten);

    if(item && item.ton >= sl){
        item.xuat += sl;
        item.ton -= sl;
        item.soluong -= sl;
    } else {
        alert("Không đủ hàng");
    }

    save(); render();
}

// ===== MƯỢN =====
function muon(){
    let ten = document.getElementById("ten").value.trim();
    let sl = parseInt(document.getElementById("sl").value);
    let nguoi = document.getElementById("nguoi").value;

    let item = getItem(ten);

    if(item && item.ton >= sl){
        item.xuat += sl;
        item.ton -= sl;
        item.soluong -= sl;
        item.nguoi = nguoi;
        item.time = new Date().toLocaleString();
    } else {
        alert("Không đủ hàng");
    }

    save(); render();
}

// ===== TRẢ =====
function tra(){
    let ten = document.getElementById("ten").value.trim();
    let sl = parseInt(document.getElementById("sl").value);

    let item = getItem(ten);

    if(item){
        item.nhap += sl;
        item.ton += sl;
        item.soluong += sl;
        item.nguoi = "";
        item.time = "";
    }

    save(); render();
}

// ===== XOÁ =====
function xoa(){
    let ten = document.getElementById("ten").value.trim();
    data = data.filter(d => d.ten.toLowerCase() !== ten.toLowerCase());

    save(); render();
}

render();
</script>

</body>
</html>
