<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Quản lý kho</title>
</head>
<body>

<h2>📦 Quản lý kho</h2>

<img src="sodo.png" width="400"><br><br>

<input id="ten" placeholder="Tên vật chất"><br><br>
<input id="nguoi" placeholder="Người mượn"><br><br>
<input id="thoigian" placeholder="Thời gian"><br><br>
<input id="soluong" type="number" placeholder="Số lượng"><br><br>

<button onclick="nhap()">Nhập</button>
<button onclick="xuat()">Xuất</button>

<h3>Số lượng hiện tại:</h3>
<div id="tonkho">0</div>

<h3>Lịch sử:</h3>
<ul id="lichsu"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, get, child, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDM9SSwVDdVqTY2iqhVqqFboXj1J-2v6HI",
  authDomain: "quanlykho-fb73b.firebaseapp.com",
  databaseURL: "https://quanlykho-fb73b-default-rtdb.firebaseio.com",
  projectId: "quanlykho-fb73b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Lấy tồn kho
async function getTonKho(ten) {
  const snapshot = await get(ref(db, "tonkho/" + ten));
  if (snapshot.exists()) {
    return snapshot.val();
  } else {
    return 0;
  }
}

// Cập nhật tồn kho
async function updateTonKho(ten, soluong) {
  await set(ref(db, "tonkho/" + ten), soluong);
}

// NHẬP
window.nhap = async function() {
  const ten = document.getElementById("ten").value;
  const nguoi = document.getElementById("nguoi").value;
  const thoigian = document.getElementById("thoigian").value;
  const soluong = parseInt(document.getElementById("soluong").value);

  let ton = await getTonKho(ten);
  ton += soluong;

  await updateTonKho(ten, ton);

  push(ref(db, "lichsu"), {
    loai: "Nhập",
    ten,
    nguoi,
    thoigian,
    soluong
  });
}

// XUẤT
window.xuat = async function() {
  const ten = document.getElementById("ten").value;
  const nguoi = document.getElementById("nguoi").value;
  const thoigian = document.getElementById("thoigian").value;
  const soluong = parseInt(document.getElementById("soluong").value);

  let ton = await getTonKho(ten);
  ton -= soluong;
  if (ton < 0) ton = 0;

  await updateTonKho(ten, ton);

  push(ref(db, "lichsu"), {
    loai: "Xuất",
    ten,
    nguoi,
    thoigian,
    soluong
  });
}

// HIỂN THỊ TỒN KHO
const tonkhoDiv = document.getElementById("tonkho");

document.getElementById("ten").addEventListener("input", async () => {
  const ten = document.getElementById("ten").value;
  const ton = await getTonKho(ten);
  tonkhoDiv.innerText = ton;
});

// HIỂN THỊ LỊCH SỬ
const list = document.getElementById("lichsu");

onValue(ref(db, "lichsu"), (snapshot) => {
  list.innerHTML = "";
  snapshot.forEach(child => {
    const item = child.val();
    const li = document.createElement("li");
    li.innerText = `${item.loai} | ${item.ten} | ${item.soluong} | ${item.nguoi} | ${item.thoigian}`;
    list.appendChild(li);
  });
});
</script>

</body>
</html>
